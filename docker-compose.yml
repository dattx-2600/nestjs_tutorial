services:
  mysqldb:
    image: mysql:8.0
    container_name: tuto_mysql_container
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: tutorial_db
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql

  nestjs-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nest_api_tuto
    env_file:
      - .env
    restart: always
    ports:
      - '3000:3000'
    environment:
      - DATABASE_HOST=mysqldb
      - DATABASE_PORT=3306
      - DATABASE_USER=root
      - DATABASE_PASSWORD=root
      - DATABASE_NAME=tutorial_db
    command: npm run start:dev
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      - mysqldb

volumes:
  mysql_data: